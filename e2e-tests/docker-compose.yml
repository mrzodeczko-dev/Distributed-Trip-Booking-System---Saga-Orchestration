services:
  # ------------------------------------------------
  # RabbitMQ (single node for E2E)
  # ------------------------------------------------
  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: e2e_user
      RABBITMQ_DEFAULT_PASS: e2e_password
      RABBITMQ_DEFAULT_VHOST: /
    expose:
      - "5672"
      - "15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - e2e-net

  # ------------------------------------------------
  # MySQL for booking-service
  # ------------------------------------------------
  booking-mysql:
    image: mysql:9.6.0
    environment:
      MYSQL_ROOT_PASSWORD: e2e-root-pass
      MYSQL_DATABASE: booking_db
      MYSQL_USER: e2e_user
      MYSQL_PASSWORD: e2e_password
    command: >
      --default-time-zone='+00:00'
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    expose:
      - "3306"
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h localhost -u e2e_user -pe2e_password -e \"SELECT 1\"" ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
    networks:
      - e2e-net

  # ------------------------------------------------
  # MySQL for flight-service
  # ------------------------------------------------
  flight-mysql:
    image: mysql:9.6.0
    environment:
      MYSQL_ROOT_PASSWORD: e2e-root-pass
      MYSQL_DATABASE: flight_db
      MYSQL_USER: e2e_user
      MYSQL_PASSWORD: e2e_password
    command: >
      --default-time-zone='+00:00'
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    expose:
      - "3306"
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h localhost -u e2e_user -pe2e_password -e \"SELECT 1\"" ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
    networks:
      - e2e-net

  # ------------------------------------------------
  # MySQL for hotel-service
  # ------------------------------------------------
  hotel-mysql:
    image: mysql:9.6.0
    environment:
      MYSQL_ROOT_PASSWORD: e2e-root-pass
      MYSQL_DATABASE: hotel_db
      MYSQL_USER: e2e_user
      MYSQL_PASSWORD: e2e_password
    command: >
      --default-time-zone='+00:00'
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    expose:
      - "3306"
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h localhost -u e2e_user -pe2e_password -e \"SELECT 1\"" ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
    networks:
      - e2e-net

  # ------------------------------------------------
  # MySQL for payment-service
  # ------------------------------------------------
  payment-mysql:
    image: mysql:9.6.0
    environment:
      MYSQL_ROOT_PASSWORD: e2e-root-pass
      MYSQL_DATABASE: payment_db
      MYSQL_USER: e2e_user
      MYSQL_PASSWORD: e2e_password
    command: >
      --default-time-zone='+00:00'
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    expose:
      - "3306"
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h localhost -u e2e_user -pe2e_password -e \"SELECT 1\"" ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
    networks:
      - e2e-net

  # ------------------------------------------------
  # Booking Service (Saga Orchestrator)
  # ------------------------------------------------
  booking-service:
    image: saga-booking-service
    build:
      context: ..
      dockerfile: booking-service/Dockerfile
    expose:
      - "8080"
    depends_on:
      booking-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_APPLICATION_NAME: booking-service
      SPRING_DATASOURCE_URL: jdbc:mysql://booking-mysql:3306/booking_db?useUnicode=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: e2e_user
      SPRING_DATASOURCE_PASSWORD: e2e_password
      SPRING_RABBITMQ_ADDRESSES: amqp://rabbitmq:5672
      SPRING_RABBITMQ_USERNAME: e2e_user
      SPRING_RABBITMQ_PASSWORD: e2e_password
      SPRING_RABBITMQ_VIRTUAL_HOST: /
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - e2e-net

  # ------------------------------------------------
