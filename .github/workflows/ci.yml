name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  # --- Flight-service buduje się pierwszy, bo booking-service potrzebuje jego stubów ---
  build-flight-service:
    name: flight-service (stubs provider)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: flight-service/pom.xml

      - name: Build, test and install stubs
        working-directory: flight-service
        run: mvn -B clean install

      - name: Cache flight-service stubs in local Maven repo
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/com/rzodeczko/flight-service
          key: flight-stubs-${{ github.sha }}

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-flight-service
          path: flight-service/target/site/jacoco/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-flight-service
          path: flight-service/target/surefire-reports/
          retention-days: 14

  # --- Booking-service zależy od stubów flight-service ---
  build-booking-service:
    name: booking-service
    runs-on: ubuntu-latest
    needs: build-flight-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: booking-service/pom.xml

      - name: Restore flight-service stubs
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/rzodeczko/flight-service
          key: flight-stubs-${{ github.sha }}

      - name: Build and test
        working-directory: booking-service
        run: mvn -B clean verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-booking-service
          path: booking-service/target/site/jacoco/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-booking-service
          path: booking-service/target/surefire-reports/
          retention-days: 14

  # --- Hotel i payment nie mają zależności — budują się równolegle ---
  build-independent:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - hotel-service
          - payment-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: Build and test
        working-directory: ${{ matrix.service }}
        run: mvn -B clean verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.service }}
          path: ${{ matrix.service }}/target/site/jacoco/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/
          retention-days: 14
