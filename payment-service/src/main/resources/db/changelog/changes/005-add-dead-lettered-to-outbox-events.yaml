databaseChangeLog:
  - changeSet:
      id: 005-add-dead-lettered-to-outbox-events
      author: rzodeczko
      changes:
        - addColumn:
            tableName: outbox_events
            columns:
              - column:
                  name: dead_lettered
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: dead_lettered_at
                  type: DATETIME
